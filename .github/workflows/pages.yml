# Собирает Vite и публикует только dist/ в ветку gh-pages.
# В репозитории: Settings → Pages → Source: branch «gh-pages», folder «/ (root)».
# Не используйте корень ветки main как источник Pages — там index.html для dev (/src/main.jsx).

name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE_PATH: /style
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
